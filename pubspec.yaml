name: therapylink
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.3.0
  firebase_storage: ^12.4.7
  firedart: ^0.9.8
  firebase_ui_firestore: ^1.7.2
  firebase_rules: ^0.2.1

  # State Management & Networking
  flutter_bloc: ^9.0.0  
  bloc: ^9.0.0
  dio: ^5.8.0+1
  http: ^1.3.0
  fl_chart: ^0.65.0
  geocoding: ^2.0.0
  geolocator: ^9.0.0
  # AI & Utilities
  google_generative_ai: ^0.4.6
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  concentric_transition: ^1.0.0
  # UI & Icons
  cupertino_icons: ^1.0.6
  meta: ^1.12.0
  flutter_svg: ^2.0.17
  salomon_bottom_bar: ^3.3.2
  google_maps_flutter: ^2.0.6
  flutter_staggered_grid_view: ^0.4.0
  flutter_signin_button: ^2.0.0
  firebase_data_connect: ^0.1.0

  youtube_player_flutter: ^9.1.1
  url_launcher: ^6.2.5
  flutter_inappwebview: ^6.1.5
  audioplayers: ^5.2.1
  emoji_picker_flutter: ^4.3.0





dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/starry_sky.mp3
    - assets/starry_sky.jpg
    - assets/ocean.jpg
    - assets/audio/rain.mp3
    - assets/audio/ocean_breeze.mp3
    - assets/audio/white_noise.mp3
    - assets/audio/binaural_beats.mp3
    - assets/audio/fireplace.mp3
    - assets/therapyjusttext.png


flutter_icons:
  android: true
  ios: true
  image_path: "assets/therapylink_logo.png"  # Replace with your actual image path
  adaptive_icon_foreground: "assets/therapylink_logo.png"
  adaptive_icon_background: "#ffffff"
