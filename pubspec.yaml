name: therapylink
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.3.0
  firebase_ai: ^2.2.0
  flutter_spinkit: ^5.2.0
  intl_phone_field: ^3.2.0
  provider: ^6.1.0
  intl: ^0.20.2  # Ensure this is compatible with firebase_data_connect and firebase_auth


  geolocator: ^11.0.0

  local_auth: ^2.1.6

  youtube_player_flutter: ^9.1.1
  flutter_inappwebview: ^6.1.5
  audioplayers: ^5.2.1
  emoji_picker_flutter: ^4.3.0

  image_picker: ^1.0.7 


  # Permissions & Location
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  country_picker: ^2.0.20

  # State Management & Networking
  flutter_bloc: ^9.0.0  
  bloc: ^9.0.0
  dio: ^5.8.0+1
  http: ^1.3.0
  fl_chart: ^0.65.0
  # AI & Utilities
  google_generative_ai: ^0.4.6
  shared_preferences: ^2.3.3
  concentric_transition: ^1.0.0
  # UI & Icons
  cupertino_icons: ^1.0.6
  meta: ^1.12.0
  flutter_svg: ^2.0.17
  salomon_bottom_bar: ^3.3.2
  google_maps_flutter: ^2.0.6
  flutter_staggered_grid_view: ^0.4.0
  flutter_signin_button: ^2.0.0
  firebase_data_connect: ^0.1.0
  cloud_firestore: ^5.6.10
  url_launcher: ^6.3.0




dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/audio/starry_sky.mp3
    - assets/starry_sky.jpg
    - assets/ocean.jpg
    - assets/audio/rain.mp3
    - assets/audio/ocean_breeze.mp3
    - assets/audio/white_noise.mp3
    - assets/audio/binaural_beats.mp3
    - assets/audio/fireplace.mp3
    - assets/therapyjusttext.png
    - assets/therapylink_logofull.png
    - assets/therapylink_logo.png
    - assets/Therapy link.png
    - assets/background.png
    - assets/download.jpeg
    
flutter_icons:
  android: true
  ios: true
  image_path: "assets/therapylink_logo.png"  # Replace with your actual image path
  adaptive_icon_foreground: "assets/therapylink_logo.png"
  adaptive_icon_background: "#ffffff"
